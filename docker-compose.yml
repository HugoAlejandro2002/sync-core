services:
  mysql:
    image: mysql:8.0
    container_name: caja_inteligente_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: caja_inteligente
    # Host port is configurable (MYSQL_HOST_PORT) to avoid clashing with a local MySQL.
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - caja_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 15

  migrate:
    build: .
    container_name: caja_inteligente_migrate
    restart: "no"
    environment:
      DATABASE_URL: "mysql+asyncmy://root:password@mysql:3306/caja_inteligente"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-replace-me}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"
      LOCAL_MEDIA_DIR: "/app/storage/media"
      APP_ENV: "production"
      APP_DEBUG: "false"
    volumes:
      - caja_media_data:/app/storage/media
    depends_on:
      mysql:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  web:
    build: .
    container_name: caja_inteligente_api
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    environment:
      DATABASE_URL: "mysql+asyncmy://root:password@mysql:3306/caja_inteligente"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-replace-me}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"
      LOCAL_MEDIA_DIR: "/app/storage/media"
      APP_ENV: "production"
      APP_DEBUG: "false"
    volumes:
      - caja_media_data:/app/storage/media
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  caja_mysql_data:
  caja_media_data:
